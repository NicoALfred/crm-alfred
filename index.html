<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alfred CRM</title>
<style>
  :root {
    --bleu: #A8D5DC;
    --bleu-pale: #D6EEF2;
    --noir: #1A1A1A;
    --gris: #6B6B6B;
    --gris-clair: #F0F0F0;
    --blanc-casse: #F8F6F2;
    --blanc: #FFFFFF;
    --rouge: #D94F4F;
    --orange: #E8A040;
    --vert: #4DA882;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sweet Sans Pro','Gill Sans','Century Gothic','Futura',sans-serif; background: var(--blanc-casse); color: var(--noir); min-height: 100vh; }

  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: var(--noir); display: flex; flex-direction: column; padding: 32px 0 24px; z-index: 100; }
  .sidebar-logo { padding: 0 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.12); text-align: center; }
  .sidebar-logo svg { width: 100%; max-width: 150px; display: block; margin: 0 auto; }
  .sidebar-nav { flex: 1; padding: 20px 0; display: flex; flex-direction: column; gap: 2px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 24px; color: rgba(255,255,255,0.45); font-size: 12px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent; text-transform: uppercase; }
  .nav-item:hover { color: var(--blanc); background: rgba(255,255,255,0.07); }
  .nav-item.active { color: var(--bleu); border-left-color: var(--bleu); background: rgba(168,213,220,0.1); font-weight: 600; }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.12); }
  .btn-add-lead { width: 100%; padding: 11px; background: var(--bleu); color: var(--noir); border: none; border-radius: var(--radius); font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; }
  .btn-add-lead:hover { opacity: 0.85; }

  .main { margin-left: 220px; padding: 40px 48px; min-height: 100vh; }
  .page { display: none; }
  .page.active { display: block; }
  .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 36px; }
  .page-title { font-size: 30px; font-weight: 700; color: var(--noir); line-height: 1; letter-spacing: -0.02em; }
  .page-subtitle { font-size: 13px; color: var(--gris); margin-top: 6px; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; margin-bottom: 36px; }
  .stat-card { background: var(--blanc); border-radius: var(--radius); padding: 22px 24px; box-shadow: var(--shadow); border-top: 3px solid transparent; }
  .stat-card.bleu { border-top-color: var(--bleu); }
  .stat-card.vert { border-top-color: var(--vert); }
  .stat-card.orange { border-top-color: var(--orange); }
  .stat-card.rouge { border-top-color: var(--rouge); }
  .stat-card.violet { border-top-color: #9B7FD4; }
  .stat-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gris); margin-bottom: 10px; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--noir); line-height: 1; }
  .stat-value span { font-size: 13px; font-weight: 400; color: var(--gris); }
  .stat-sub { font-size: 11px; color: var(--gris); margin-top: 6px; }

  /* KANBAN */
  .kanban { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; align-items: start; }
  .kanban-col { background: var(--gris-clair); border-radius: var(--radius); padding: 14px; min-height: 180px; }
  .kanban-col.drag-over { background: var(--bleu-pale); outline: 2px dashed var(--bleu); }
  .kanban-col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--blanc); }
  .kanban-col-title { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; color: var(--gris); }
  .kanban-col-count { background: var(--blanc); color: var(--gris); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  .kanban-col[data-statut="En discussion"] .kanban-col-title { color: #3A9AAA; }
  .kanban-col[data-statut="Devis envoyé"] .kanban-col-title { color: var(--orange); }
  .kanban-col[data-statut="Gagné"] .kanban-col-title { color: var(--vert); }
  .kanban-col[data-statut="Perdu"] .kanban-col-title { color: var(--rouge); }
  .kanban-cards { display: flex; flex-direction: column; gap: 8px; min-height: 60px; }
  .card { background: var(--blanc); border-radius: 8px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); cursor: grab; transition: transform 0.15s, box-shadow 0.15s; border-left: 3px solid transparent; user-select: none; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
  .card.dragging { opacity: 0.4; cursor: grabbing; }
  .card[data-statut="En discussion"] { border-left-color: var(--bleu); }
  .card[data-statut="Devis envoyé"] { border-left-color: var(--orange); }
  .card[data-statut="Gagné"] { border-left-color: var(--vert); }
  .card[data-statut="Perdu"] { border-left-color: var(--rouge); }
  .card-entreprise { font-size: 13px; font-weight: 700; color: var(--noir); margin-bottom: 3px; }
  .card-contact { font-size: 11px; color: var(--gris); margin-bottom: 8px; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .card-statut-select { font-size: 10px; border: 1px solid #E0E0E0; border-radius: 6px; padding: 3px 6px; font-family: inherit; background: var(--blanc); color: var(--gris); cursor: pointer; flex: 1; }
  .card-relance { font-size: 10px; color: var(--gris); white-space: nowrap; }
  .card-relance.urgent { color: var(--rouge); font-weight: 700; }
  .card-relance.warning { color: var(--orange); font-weight: 700; }
  .card-assignee { width: 24px; height: 24px; border-radius: 50%; background: var(--bleu-pale); color: #3A9AAA; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* TABLEAU CLIENTS */
  .table-wrap { background: var(--blanc); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .table-filters { padding: 18px 22px; border-bottom: 1px solid var(--gris-clair); display: flex; gap: 10px; align-items: center; }
  .filter-search { flex: 1; padding: 9px 14px; border: 1px solid #E0E0E0; border-radius: 8px; font-family: inherit; font-size: 12px; outline: none; transition: border-color 0.15s; }
  .filter-search:focus { border-color: var(--bleu); }
  .filter-select { padding: 9px 12px; border: 1px solid #E0E0E0; border-radius: 8px; font-family: inherit; font-size: 12px; outline: none; background: var(--blanc); cursor: pointer; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 11px 18px; text-align: left; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gris); background: var(--gris-clair); font-weight: 700; }
  tbody tr { border-bottom: 1px solid #F2F2F2; transition: background 0.1s; }
  tbody tr:hover { background: var(--bleu-pale); }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 13px 18px; font-size: 12px; color: var(--noir); }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .badge-encours { background: #E0F5EC; color: var(--vert); }
  .badge-pause { background: #FFF3E0; color: var(--orange); }
  .badge-averifier { background: var(--bleu-pale); color: #3A9AAA; }
  .badge-retard { background: #FFECEC; color: var(--rouge); }
  .badge-ajour { background: #E0F5EC; color: var(--vert); }

  /* RELANCES */
  .relances-list { display: flex; flex-direction: column; gap: 12px; }
  .relance-card { background: var(--blanc); border-radius: var(--radius); padding: 20px 24px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--orange); }
  .relance-card.urgent { border-left-color: var(--rouge); }
  .relance-info h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .relance-info p { font-size: 12px; color: var(--gris); }
  .relance-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .btn-relancer { padding: 7px 14px; background: var(--noir); color: var(--blanc); border: none; border-radius: 6px; font-family: inherit; font-size: 11px; cursor: pointer; transition: opacity 0.15s; }
  .btn-relancer:hover { opacity: 0.8; }
  .btn-statut-relance { padding: 7px 14px; border: 1px solid #E0E0E0; background: var(--blanc); border-radius: 6px; font-family: inherit; font-size: 11px; cursor: pointer; transition: background 0.15s; }
  .btn-statut-relance:hover { background: var(--gris-clair); }
  .relance-meta { text-align: right; flex-shrink: 0; margin-left: 20px; }
  .relance-jours { font-size: 30px; font-weight: 700; color: var(--orange); line-height: 1; }
  .relance-card.urgent .relance-jours { color: var(--rouge); }
  .relance-label { font-size: 9px; color: var(--gris); letter-spacing: 0.1em; text-transform: uppercase; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,26,0.45); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--blanc); border-radius: 14px; width: 580px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.18); }
  .modal-header { padding: 26px 30px 18px; border-bottom: 1px solid var(--gris-clair); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 20px; font-weight: 700; }
  .modal-close { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--gris-clair); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { background: #E0E0E0; }
  .modal-body { padding: 24px 30px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gris); font-weight: 700; }
  .form-input, .form-select, .form-textarea { padding: 9px 12px; border: 1px solid #E0E0E0; border-radius: 8px; font-family: inherit; font-size: 12px; outline: none; transition: border-color 0.15s; color: var(--noir); }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--bleu); }
  .form-textarea { resize: vertical; min-height: 72px; }
  .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .service-checkbox { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid #E0E0E0; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .service-checkbox:hover { border-color: var(--bleu); background: var(--bleu-pale); }
  .service-checkbox input { accent-color: var(--bleu); width: 14px; height: 14px; cursor: pointer; }
  .service-checkbox label { font-size: 12px; cursor: pointer; }
  .service-checkbox.checked { border-color: var(--bleu); background: var(--bleu-pale); }
  .assigne-wrap { display: flex; gap: 8px; align-items: center; }
  .assigne-wrap select { flex: 1; }
  .btn-add-assigne { padding: 9px 12px; background: var(--gris-clair); border: 1px solid #E0E0E0; border-radius: 8px; font-family: inherit; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .btn-add-assigne:hover { background: #E0E0E0; }
  .modal-footer { padding: 18px 30px 26px; display: flex; gap: 10px; justify-content: flex-end; }
  .btn-secondary { padding: 9px 22px; border: 1px solid #E0E0E0; background: var(--blanc); border-radius: 8px; font-family: inherit; font-size: 12px; cursor: pointer; }
  .btn-secondary:hover { background: var(--gris-clair); }
  .btn-primary { padding: 9px 22px; background: var(--noir); color: var(--blanc); border: none; border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.85; }

  /* CONFIRMATION */
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,26,0.5); z-index: 2000; align-items: center; justify-content: center; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: var(--blanc); border-radius: 12px; padding: 28px 32px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
  .confirm-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  .confirm-box p { font-size: 13px; color: var(--gris); margin-bottom: 24px; }
  .confirm-btns { display: flex; gap: 10px; justify-content: center; }

  .loading { display: flex; align-items: center; justify-content: center; padding: 80px; color: var(--gris); font-size: 12px; letter-spacing: 0.1em; }
  .empty-state { text-align: center; padding: 60px; color: var(--gris); }
  .empty-state p { font-size: 12px; margin-top: 8px; }
</style>
</head>

<script>
const API = "https://script.google.com/macros/s/AKfycbzrQJzhHWsSlRtcETVAGpgV_mjd5kiaH5pgYYz1O-HbQ3CIR-K0h2_fk50i--vFUInKzQ/exec";
let leadsData = [], clientsData = [], leadDetailCourant = null;
let dragLeadId = null, dragTargetStatut = null;
const SERVICES = ["Nettoyage", "Café / Tisanerie", "Consommables", "Fontaines à eau", "Snacking"];
let assignesList = ["Nicolas", "Alexis"];

function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelector('[data-page="' + page + '"]').classList.add('active');
}

function setDate() {
  const opts = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
  document.getElementById('date-today').textContent = new Date().toLocaleDateString('fr-FR', opts);
}

async function chargerDonnees() {
  try {
    const [leads, clients, statsFacturier] = await Promise.all([
      fetch(API + "?action=getLeads").then(r => r.json()),
      fetch(API + "?action=getClients").then(r => r.json()),
      fetch(API + "?action=getStatsFacturier").then(r => r.json()),
    ]);
    leadsData = Array.isArray(leads) ? leads : [];
    clientsData = Array.isArray(clients) ? clients : [];
    renderDashboard(statsFacturier);
    renderKanban('kanban-board');
    renderClients();
    renderRelances();
  } catch(e) {
    document.getElementById('stats-grid').innerHTML = '<div class="loading">Impossible de charger. Vérifiez le déploiement Apps Script.</div>';
  }
}

function renderDashboard(stats) {
  const annee = new Date().getFullYear();
  const caReel = stats && stats.caReel ? stats.caReel.toLocaleString('fr-FR') + ' €' : '—';
  const caEstime = stats && stats.caEstime ? stats.caEstime.toLocaleString('fr-FR') + ' €' : '—';
  const nbActifs = stats && stats.nbClientsActifs !== undefined ? stats.nbClientsActifs : '—';
  const nbPause = stats && stats.nbClientsPause !== undefined ? stats.nbClientsPause : '—';
  const caMensuel = stats && stats.caMensuel ? stats.caMensuel.toLocaleString('fr-FR') + ' €' : '—';
  const leadsEnCours = leadsData.filter(l => l['Statut'] !== 'Gagné' && l['Statut'] !== 'Perdu').length;
  const relancesUrgentes = leadsData.filter(l => l['Statut'] !== 'Gagné' && l['Statut'] !== 'Perdu' && diffJours(l['Date dernière relance']) >= 7).length;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card bleu">
      <div class="stat-label">CA mensuel actuel</div>
      <div class="stat-value">${caMensuel}</div>
      <div class="stat-sub">Clients actifs en cours</div>
    </div>
    <div class="stat-card vert">
      <div class="stat-label">CA réel ${annee}</div>
      <div class="stat-value">${caReel}</div>
      <div class="stat-sub">Depuis janvier ${annee}</div>
    </div>
    <div class="stat-card violet">
      <div class="stat-label">CA estimé fin ${annee}</div>
      <div class="stat-value">${caEstime}</div>
      <div class="stat-sub">Projection sur 12 mois</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-label">Clients actifs</div>
      <div class="stat-value">${nbActifs}<span> clients</span></div>
      <div class="stat-sub">${nbPause} en pause</div>
    </div>
    <div class="stat-card rouge">
      <div class="stat-label">Relances urgentes</div>
      <div class="stat-value">${relancesUrgentes}<span> leads</span></div>
      <div class="stat-sub">${leadsEnCours} leads en cours</div>
    </div>
  `;
}

function renderKanban(containerId) {
  const statuts = ['En discussion', 'Devis envoyé', 'Gagné', 'Perdu'];
  const html = statuts.map(statut => {
    const cards = leadsData.filter(l => l['Statut'] === statut);
    const cardsHtml = cards.length === 0
      ? '<div style="padding:16px;text-align:center;color:#B0B0B0;font-size:11px">Aucun lead</div>'
      : cards.map(renderCard).join('');
    return `<div class="kanban-col" data-statut="${statut}"
      ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, '${statut}')">
      <div class="kanban-col-header">
        <div class="kanban-col-title">${statut}</div>
        <div class="kanban-col-count">${cards.length}</div>
      </div>
      <div class="kanban-cards">${cardsHtml}</div>
    </div>`;
  }).join('');
  document.getElementById(containerId).innerHTML = '<div class="kanban">' + html + '</div>';
}

function renderCard(lead) {
  const initiales = (lead['Assigné à'] || '—').substring(0, 2).toUpperCase();
  const jours = diffJours(lead['Date dernière relance']);
  let relanceClass = '', relanceTxt = '';
  if (lead['Statut'] !== 'Gagné' && lead['Statut'] !== 'Perdu') {
    if (jours >= 14) { relanceClass = 'urgent'; relanceTxt = jours + 'j ⚠'; }
    else if (jours >= 7) { relanceClass = 'warning'; relanceTxt = jours + 'j'; }
    else if (jours > 0) { relanceTxt = 'il y a ' + jours + 'j'; }
  }
  const statutOptions = ['En discussion','Devis envoyé','Gagné','Perdu']
    .map(s => `<option value="${s}" ${s === lead['Statut'] ? 'selected' : ''}>${s}</option>`).join('');
  return `<div class="card" data-statut="${lead['Statut']}" data-id="${lead['ID']}"
    draggable="true" ondragstart="onDragStart(event, '${lead['ID']}')" onclick="ouvrirDetail('${lead['ID']}')">
    <div class="card-entreprise">${lead['Entreprise'] || '—'}</div>
    <div class="card-contact">${lead['Prénom/Nom'] || ''}</div>
    <div class="card-footer">
      <select class="card-statut-select" onclick="event.stopPropagation()" onchange="changerStatutMenu(event, '${lead['ID']}')">
        ${statutOptions}
      </select>
      <div class="card-relance ${relanceClass}">${relanceTxt}</div>
      <div class="card-assignee">${initiales}</div>
    </div>
  </div>`;
}

function diffJours(dateStr) {
  if (!dateStr) return 0;
  const d = new Date(dateStr); if (isNaN(d)) return 0;
  return Math.floor((new Date() - d) / 86400000);
}

function onDragStart(e, id) {
  dragLeadId = id;
  setTimeout(() => { const el = document.querySelector(`[data-id="${id}"]`); if (el) el.classList.add('dragging'); }, 0);
}
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, statut) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const lead = leadsData.find(l => l['ID'] === dragLeadId);
  if (!lead || lead['Statut'] === statut) return;
  dragTargetStatut = statut;
  document.getElementById('confirm-drag-text').textContent = `Déplacer "${lead['Entreprise']}" vers "${statut}" ?`;
  document.getElementById('confirm-drag').classList.add('open');
}
function annulerDrag() {
  document.getElementById('confirm-drag').classList.remove('open');
  dragLeadId = null; dragTargetStatut = null;
  renderKanban('kanban-board');
}
async function confirmerDrag() {
  document.getElementById('confirm-drag').classList.remove('open');
  if (!dragLeadId || !dragTargetStatut) return;
  try {
    await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'updateStatutLead', id: dragLeadId, statut: dragTargetStatut }) });
    await chargerDonnees();
  } catch(e) { alert('Erreur lors du déplacement.'); }
  dragLeadId = null; dragTargetStatut = null;
}
async function changerStatutMenu(e, id) {
  const newStatut = e.target.value;
  const lead = leadsData.find(l => l['ID'] === id);
  if (!lead || lead['Statut'] === newStatut) return;
  dragLeadId = id; dragTargetStatut = newStatut;
  document.getElementById('confirm-drag-text').textContent = `Passer "${lead['Entreprise']}" en "${newStatut}" ?`;
  document.getElementById('confirm-drag').classList.add('open');
}

function renderClients(filtre = '', statutFiltre = '') {
  let data = clientsData;
  if (!data || data.length === 0) {
    document.getElementById('clients-table').innerHTML = '<div class="empty-state"><p>Aucun client dans la base.</p></div>';
    document.getElementById('clients-count').textContent = '0 client';
    return;
  }
  if (filtre) { const f = filtre.toLowerCase(); data = data.filter(c => (c['Société (Facturation)'] || '').toLowerCase().includes(f) || (c['Occupant'] || '').toLowerCase().includes(f)); }
  if (statutFiltre) { data = data.filter(c => c['Statut'] === statutFiltre); }
  document.getElementById('clients-count').textContent = data.length + ' client' + (data.length > 1 ? 's' : '');
  const rows = data.map(c => {
    const statut = c['Statut'] || 'En cours';
    const badgeClass = statut === 'En cours' ? 'badge-encours' : statut === 'En pause' ? 'badge-pause' : 'badge-averifier';
    const total = parseFloat(c['TOTAL (€/mois)']) || 0;
    const facturation = c['Statut Facturation'] || '';
    const factClass = facturation === 'En retard' ? 'badge-retard' : 'badge-ajour';
    return `<tr>
      <td><strong>${c['Société (Facturation)'] || '—'}</strong></td>
      <td>${c['Occupant'] || '—'}</td>
      <td>${c['Services'] || '—'}</td>
      <td><span class="badge ${badgeClass}">${statut}</span></td>
      <td>${total ? total.toLocaleString('fr-FR') + ' €' : '—'}</td>
      <td>${facturation ? '<span class="badge ' + factClass + '">' + facturation + '</span>' : '—'}</td>
      <td>${c['Agent'] || '—'}</td>
    </tr>`;
  }).join('');
  document.getElementById('clients-table').innerHTML = `<table>
    <thead><tr><th>Société</th><th>Occupant</th><th>Services</th><th>Statut</th><th>CA/mois</th><th>Facturation</th><th>Agent</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}
function filtrerClients(val) { renderClients(val, document.querySelector('.filter-select').value); }
function filtrerClientsStatut(val) { renderClients(document.querySelector('.filter-search').value, val); }

function renderRelances() {
  const container = document.getElementById('relances-list');
  const urgents = leadsData.filter(l => l['Statut'] !== 'Gagné' && l['Statut'] !== 'Perdu' && diffJours(l['Date dernière relance']) >= 7)
    .sort((a, b) => diffJours(b['Date dernière relance']) - diffJours(a['Date dernière relance']));
  if (urgents.length === 0) { container.innerHTML = '<div class="empty-state">✅<p>Aucune relance en attente.</p></div>'; return; }
  container.innerHTML = urgents.map(l => {
    const jours = diffJours(l['Date dernière relance']);
    const statutBtns = ['En discussion','Devis envoyé','Gagné','Perdu']
      .filter(s => s !== l['Statut'])
      .map(s => `<button class="btn-statut-relance" onclick="changerStatutRelance('${l['ID']}', '${s}')">→ ${s}</button>`)
      .join('');
    return `<div class="relance-card ${jours >= 14 ? 'urgent' : ''}">
      <div class="relance-info">
        <h3>${l['Entreprise'] || '—'}</h3>
        <p>${l['Prénom/Nom'] || ''} · ${l['Statut']} · ${l['Assigné à'] || '—'}</p>
        <p style="margin-top:4px;color:#999;font-size:11px">${l['Commentaires'] || ''}</p>
        <div class="relance-actions">
          <button class="btn-relancer" onclick="ouvrirDetail('${l['ID']}')">Voir le lead</button>
          ${statutBtns}
        </div>
      </div>
      <div class="relance-meta">
        <div class="relance-jours">${jours}</div>
        <div class="relance-label">jours sans<br>contact</div>
      </div>
    </div>`;
  }).join('');
}

async function changerStatutRelance(id, newStatut) {
  const lead = leadsData.find(l => l['ID'] === id);
  if (!lead) return;
  dragLeadId = id; dragTargetStatut = newStatut;
  document.getElementById('confirm-drag-text').textContent = `Passer "${lead['Entreprise']}" en "${newStatut}" ?`;
  document.getElementById('confirm-drag').classList.add('open');
}

function renderServicesCheckboxes() {
  document.getElementById('services-checkboxes').innerHTML = SERVICES.map(s =>
    `<label class="service-checkbox">
      <input type="checkbox" value="${s}" onchange="this.closest('label').classList.toggle('checked', this.checked)">
      <span>${s}</span>
    </label>`
  ).join('');
}
function renderAssigneSelect() {
  document.getElementById('f-assigne').innerHTML = assignesList.map(a => `<option value="${a}">${a}</option>`).join('');
}
function ajouterAssigne() {
  const nom = prompt('Prénom du nouveau commercial :');
  if (nom && nom.trim() && !assignesList.includes(nom.trim())) {
    assignesList.push(nom.trim());
    renderAssigneSelect();
    document.getElementById('f-assigne').value = nom.trim();
  }
}
function ouvrirModalLead() { renderServicesCheckboxes(); renderAssigneSelect(); document.getElementById('modal-lead').classList.add('open'); }
function fermerModal() {
  document.getElementById('modal-lead').classList.remove('open');
  ['f-nom','f-poste','f-entreprise','f-email','f-tel','f-montant','f-commentaires'].forEach(id => { document.getElementById(id).value = ''; });
}
async function sauvegarderLead() {
  const services = [...document.querySelectorAll('#services-checkboxes input:checked')].map(i => i.value).join(' + ');
  const data = {
    'Prénom/Nom': document.getElementById('f-nom').value,
    'Poste': document.getElementById('f-poste').value,
    'Entreprise': document.getElementById('f-entreprise').value,
    'Email': document.getElementById('f-email').value,
    'Téléphone': document.getElementById('f-tel').value,
    'Statut': document.getElementById('f-statut').value,
    'Montant estimé (€/mois)': document.getElementById('f-montant').value,
    'Services souhaités': services,
    'Source': document.getElementById('f-source').value,
    'Commentaires': document.getElementById('f-commentaires').value,
    'Assigné à': document.getElementById('f-assigne').value,
  };
  if (!data['Entreprise']) { alert("Le nom de l'entreprise est obligatoire."); return; }
  try {
    await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'addLead', data }) });
    fermerModal(); await chargerDonnees();
  } catch(e) { alert('Erreur lors de l\'enregistrement.'); }
}

function ouvrirDetail(id) {
  const lead = leadsData.find(l => l['ID'] === id); if (!lead) return;
  leadDetailCourant = lead;
  document.getElementById('detail-title').textContent = lead['Entreprise'] || '—';
  const prochainStatut = { 'En discussion': 'Devis envoyé', 'Devis envoyé': 'Gagné', 'Gagné': null, 'Perdu': null };
  const suivant = prochainStatut[lead['Statut']];
  document.getElementById('detail-btn-statut').textContent = suivant ? '→ ' + suivant : 'Clôturé';
  document.getElementById('detail-btn-statut').disabled = !suivant;
  document.getElementById('detail-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div><div class="form-label" style="margin-bottom:4px">Contact</div><div>${lead['Prénom/Nom'] || '—'}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">Poste</div><div>${lead['Poste'] || '—'}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">Email</div><div>${lead['Email'] || '—'}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">Téléphone</div><div>${lead['Téléphone'] || '—'}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">Statut</div><div><strong>${lead['Statut'] || '—'}</strong></div></div>
      <div><div class="form-label" style="margin-bottom:4px">Assigné à</div><div>${lead['Assigné à'] || '—'}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">Dernière relance</div><div>${lead['Date dernière relance'] || '—'}</div></div>
      <div><div class="form-label" style="margin-bottom:4px">Montant estimé</div><div>${lead['Montant estimé (€/mois)'] ? lead['Montant estimé (€/mois)'] + ' €/mois' : '—'}</div></div>
      <div style="grid-column:1/-1"><div class="form-label" style="margin-bottom:4px">Services</div><div>${lead['Services souhaités'] || '—'}</div></div>
      <div style="grid-column:1/-1"><div class="form-label" style="margin-bottom:4px">Commentaires</div><div style="background:#F8F6F2;padding:10px;border-radius:8px;font-size:12px">${lead['Commentaires'] || '—'}</div></div>
    </div>`;
  document.getElementById('modal-detail').classList.add('open');
}
function fermerModalDetail() { document.getElementById('modal-detail').classList.remove('open'); leadDetailCourant = null; }
async function changerStatutDepuisDetail() {
  if (!leadDetailCourant) return;
  const prochainStatut = { 'En discussion': 'Devis envoyé', 'Devis envoyé': 'Gagné' };
  const suivant = prochainStatut[leadDetailCourant['Statut']];
  if (!suivant) return;
  try {
    await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'updateStatutLead', id: leadDetailCourant['ID'], statut: suivant }) });
    fermerModalDetail(); await chargerDonnees();
  } catch(e) { alert('Erreur lors de la mise à jour.'); }
}

document.getElementById('modal-lead').addEventListener('click', function(e) { if (e.target === this) fermerModal(); });
document.getElementById('modal-detail').addEventListener('click', function(e) { if (e.target === this) fermerModalDetail(); });

setDate();
chargerDonnees();
</script>
</body>
</html>
